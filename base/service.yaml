# Services for Prometheus
#
# 1. ClusterIP — akses internal dari dalam cluster
# 2. NodePort  — akses dari Grafana eksternal cluster
#    Akses Prometheus: http://<node-ip>:30090

apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name:      prometheus
    app.kubernetes.io/component: metrics-server
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name:       http
      port:       9090
      targetPort: http
      protocol:   TCP

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus-np
  namespace: monitoring
  labels:
    app.kubernetes.io/name:      prometheus
    app.kubernetes.io/component: metrics-server-nodeport
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name:       http
      port:       9090
      targetPort: http
      protocol:   TCP
      nodePort:   30090   # Grafana datasource: http://<node-ip>:30090
