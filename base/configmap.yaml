# ConfigMap for Prometheus
# Menggunakan kubernetes_sd_configs untuk auto-discovery pod dengan annotation:
#   prometheus.io/scrape: "true"
#   prometheus.io/port: "3000"
#   prometheus.io/path: "/metrics"
# Prometheus scrape langsung ke pod IP:port (bukan melalui ClusterIP Service).

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name:      prometheus
    app.kubernetes.io/component: config
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        cluster: "kubernetes"
        env:     "production"

    scrape_configs:

      # ── Auto-discover pods via annotation ─────────────────────────────────────
      # Pod harus punya annotation:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/port: "3000"    (port container, bukan service port)
      #   prometheus.io/path: "/metrics" (opsional, default /metrics)
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Hanya scrape pod yang punya annotation prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"

          # Gunakan annotation port jika ada
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

          # Gunakan annotation path jika ada (default /metrics)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          # Label namespace
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          # Label pod name
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          # Label app dari pod label
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service

          # Label app.kubernetes.io/name
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: job

      # ── Prometheus self-monitoring ─────────────────────────────────────────────
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
            labels:
              service: "prometheus"
              namespace: "monitoring"
