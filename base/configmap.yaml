# ConfigMap for Prometheus
# kubernetes_sd_configs: auto-discover pod dengan annotation prometheus.io/scrape: "true"
# Prometheus scrape langsung ke pod IP:port (bukan via ClusterIP Service).
#
# Annotations yang diperlukan di pod template:
#   prometheus.io/scrape: "true"
#   prometheus.io/port:   "3000"   <- container port
#   prometheus.io/path:   "/metrics"

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name:      prometheus
    app.kubernetes.io/component: config
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        cluster: "kubernetes"
        env:     "production"

    scrape_configs:

      # ── Auto-discover pods via annotation ─────────────────────────────────────
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:

          # 1. Hanya scrape pod dengan annotation scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"

          # 2. Ganti port di __address__ dengan annotation port
          #    __address__ awal = <pod-ip>:<default-port>
          #    source: "<pod-ip>:<x>;<annotation-port>" → replacement: "<pod-ip>:<annotation-port>"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: "([^:]+)(?::\\d+)?;(\\d+)"
            replacement: "$1:$2"
            target_label: __address__

          # 3. Override path jika ada annotation (default Prometheus sudah /metrics)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          # 4. Label namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

          # 5. Label pod name
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

          # 6. Label container name
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: replace
            target_label: container

          # 7. Label service dari pod label app=xxx
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service

          # 8. Label job dari app.kubernetes.io/name
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: job

      # ── Prometheus self-monitoring ─────────────────────────────────────────────
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
            labels:
              service:   "prometheus"
              namespace: "monitoring"
